<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Publius</title>
  <meta name="description" content="Sign in to access your Publius account.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon-180x180.png">
</head>
<body>

  <main>
    <div class="login-page">
      <div class="login-page__bg" style="background-image: url('images/hero.png')"></div>
      <div class="login-page__overlay"></div>

      <div class="login-card">
        <div class="login-card__logo">
          <img src="images/logo.png" alt="Publius">
        </div>

        <h2 class="login-card__title">Welcome back</h2>
        <p class="login-card__subtitle">Sign in to access your Publius account</p>

        <form class="login-form" data-form="login">
          <div class="login-form__group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" required class="form__input" placeholder="you@example.com">
          </div>

          <div class="login-form__group">
            <label for="password">Password</label>
            <div class="login-form__password-wrap">
              <input type="password" id="password" name="password" autocomplete="current-password" required class="form__input" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" style="padding-right: 3rem">
              <button type="button" class="login-form__password-toggle" aria-label="Toggle password visibility">
                <!-- Eye open -->
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <!-- Eye closed -->
                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="login-form__options">
            <label class="login-form__remember">
              <input type="checkbox" name="rememberMe">
              Remember me
            </label>
            <a href="#" class="login-form__forgot">Forgot password?</a>
          </div>

          <button type="submit" class="login-form__submit">Sign in</button>

          <p class="login-card__signup">
            Don't have an account? <a href="request-demo.html">Request a demo</a>
          </p>
        </form>

        <div class="login-card__divider">
          <span>Or continue with</span>
        </div>

        <div class="login-card__social">
          <button type="button" class="login-card__social-btn">
            <svg viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </button>

          <button type="button" class="login-card__social-btn">
            <svg fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <span>GitHub</span>
          </button>
        </div>

        <p class="login-card__legal">
          By signing in, you agree to our
          <a href="terms-of-service.html">Terms of Service</a>
          and
          <a href="legal.html">Privacy Policy</a>
        </p>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
